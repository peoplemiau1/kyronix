name: test
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools qemu-system-x86 xorriso autoconf automake
          # Ensure versioned symlinks exist for the pre-generated autotools files
          # (they require aclocal-1.18 / automake-1.18 specifically)
          for ver in 1.18; do
            [ ! -x "/usr/bin/aclocal-$ver" ] && sudo ln -sf /usr/bin/aclocal "/usr/bin/aclocal-$ver" || true
            [ ! -x "/usr/bin/automake-$ver" ] && sudo ln -sf /usr/bin/automake "/usr/bin/automake-$ver" || true
          done
          # Touch generated autotools files to prevent rebuild rules from firing
          touch user/kyrobox/make/aclocal.m4 user/kyrobox/make/configure \
                user/kyrobox/make/Makefile.in user/kyrobox/make/config.h.in
      
      - name: Build test ISO
        run: | 
          make test-iso
      
      - name: Run tests in QEMU
        run: |
          timeout 2m make test-run 2>&1 | tee test.log || true
          echo "--- serial log ---"
          cat test.log 2>/dev/null || true
          if grep -q "KMEMLEAK: [1-9]" test.log 2>/dev/null; then
            echo "FAIL: kernel heap memory leak detected"
            exit 1
          fi
          if grep -q "ALL TESTS PASSED" test.log 2>/dev/null; then
            echo "PASS: all tests passed"
          else
            echo "FAIL: tests did not all pass"
            grep -E "(FAIL|SOME|KMEMLEAK)" test.log 2>/dev/null || true
            exit 1
          fi
