name: test
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools qemu-system-x86 xorriso
      - name: Build test ISO
        run: make test-iso
      - name: Run tests in QEMU
        run: |
          make test-run &
          PID=$!
          sleep 60
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          echo "Test finished"
